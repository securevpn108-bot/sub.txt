name: Auto-Expire

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  expire:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check and replace
        run: |
          CURRENT=$(date +%s)
          EXPIRE=1719608400  # 28.06.2026 20:00

          if [ $CURRENT -gt $EXPIRE ]; then
            echo '#profile-title: SecureVPN | Продлить: @SecureDaVpnBot' > sub.txt
            echo '#profile-update-interval: 12' >> sub.txt
            echo '' >> sub.txt
            echo 'vless://00000000-0000-0000-0000-000000000000@0.0.0.0:0?type=tcp&encryption=none&security=reality&fp=firefox&sni=example.com&sid=0000&spx=%2F&flow=xtls-rprx-vision#⛔️ Подписка истекла 28.06.2026 20:00' >> sub.txt
            echo 'vless://00000000-0000-0000-0000-000000000000@0.0.0.0:0?type=tcp&encryption=none&security=reality&fp=firefox&sni=example.com&sid=0000&spx=%2F&flow=xtls-rprx-vision#🔄 Продлить: @SecureDaVpnBot' >> sub.txt

            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add sub.txt
            git commit -m "Автоматическое истечение подписки в 20:00"
            git push
          fi
